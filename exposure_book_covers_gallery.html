<!DOCTYPE html>

<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060709;font-family:'Cormorant Garamond',serif;padding:32px 24px 60px}
.gallery-header{text-align:center;margin-bottom:40px}
.gallery-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.35em;color:#2a3a50;margin-bottom:4px}
.gallery-header p{font-style:italic;font-size:0.85rem;color:#1a2030}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:900px;margin:0 auto}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
.cover-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.cover-wrap:hover .cover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.6)}
.cover{width:100%;aspect-ratio:2/3;position:relative;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;box-shadow:0 6px 24px rgba(0,0,0,0.5)}
.cover svg{width:100%;height:100%;display:block}
.cover-meta{text-align:center}
.cover-meta .num{font-family:'Bebas Neue',sans-serif;font-size:0.6rem;letter-spacing:0.25em;color:#1a2535;margin-bottom:2px}
.cover-meta .title{font-family:'Cormorant Garamond',serif;font-size:0.85rem;color:#5a6878;font-weight:600}
</style>
</head>
<body>
<div class="gallery-header">
  <h2>Exposure — The Scalper Chronicles</h2>
  <p>Complete Series · Eight Volumes</p>
</div>
<div class="grid">
